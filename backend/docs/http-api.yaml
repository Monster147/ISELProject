components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string

    UserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        -name
        -email
        -password

    UserCreateTokenInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        -email
        -password

    UserCreateTokenOutput:
      type: object
      properties:
        token:
          type: string

    UserHomeOutput:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: object

    RoleInput:
      type: object
      properties:
        roleId:
          type: integer
        userId:
          type: integer
      required:
        -roleId
        -userId

    RolesInput:
      type: object
      properties:
        rolesIds:
          type: array
          items:
            type: integer
        userId:
          type: integer
      required:
        -rolesIds
        -userId

    ReportTypePercentage:
      type: object
      properties:
        type:
          type: integer
        count:
          type: integer
        percentage:
          type: number
          format: double

    CreateReportInput:
      type: object
      properties:
        creatorId:
          type: integer
        occurrenceId:
          type: integer
        title:
          type: string
        description:
          type: string
        addons:
          type: object
        language:
          type: string
      required:
        -creatorId
        -occurrenceId
        -title
        -description
        -language

    StatusInput:
      type: object
      properties:
        newStatus:
          type: string
      required:
        -newStatus

    EditorInput:
      type: object
      properties:
        editorId:
          type: integer
      required:
        -editorId

    OccurrenceCreateInput:
      type: object
      properties:
        usersId:
          type: integer
        endDate:
          type: string
          format: date
        importance:
          type: string
        occurrenceType:
          type: integer
        occurrenceInfo:
          type: object
